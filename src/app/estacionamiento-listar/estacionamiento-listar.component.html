<div class="container mt-4">
  <h2>Listado de Estacionamientos</h2>
  
  <button class="btn btn-primary mb-3" routerLink="/estacionamiento/crear">
    Nuevo Estacionamiento
  </button>
  
  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Identificador</th>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Capacidad</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let est of listaEstablecimientos">
        <td>{{ est.identificador }}</td>
        <td>{{ est.nombre }}</td>
        <td>{{ est.direccion }}</td>
        <td>{{ est.capacidad }}</td>
        <td>
          <button class="btn btn-warning btn-sm me-2" 
                  [routerLink]="['/estacionamiento/editar', est._id]">
            Editar
          </button>
          <button class="btn btn-info btn-sm" 
                  [routerLink]="['/estacionamiento/bicicletas', est.identificador]">
            Ver Bicis
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  
  <button class="btn btn-secondary mt-3" routerLink="/">Volver al Menú</button>
</div>
