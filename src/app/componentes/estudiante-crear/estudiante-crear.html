<div class="container mt-4">
  <h2>Registrar Estudiante</h2>

  <form [formGroup]="estudianteForm" (ngSubmit)="crearEstudiante()">
    <div class="mb-3">
      <label class="form-label">Nombre *</label>
      <input type="text" class="form-control" formControlName="nombre" />
      <div *ngIf="estudianteForm.get('nombre')?.invalid && estudianteForm.get('nombre')?.touched"
           class="text-danger">
        El nombre es obligatorio
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Apellido *</label>
      <input type="text" class="form-control" formControlName="apellido" />
      <div *ngIf="estudianteForm.get('apellido')?.invalid && estudianteForm.get('apellido')?.touched"
           class="text-danger">
        El apellido es obligatorio
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">RUT</label>
      <input type="text" class="form-control" formControlName="rut" />
    </div>

    <div class="mb-3">
      <label class="form-label">Correo *</label>
      <input type="email" class="form-control" formControlName="correo" />
      <div *ngIf="estudianteForm.get('correo')?.invalid && estudianteForm.get('correo')?.touched"
           class="text-danger">
        Ingresa un correo válido
      </div>
    </div>

    <button class="btn btn-success" type="submit" [disabled]="estudianteForm.invalid">
      Guardar estudiante
    </button>
  </form>

  <div *ngIf="mensaje" class="alert alert-info mt-3">
    {{ mensaje }}
  </div>
</div>
